services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: fungi_db
      MARIADB_USER: fungi
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-fungipassword}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: fungi
      DB_PASSWORD: ${MARIADB_PASSWORD:-fungipassword}
      DB_NAME: fungi_db
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
