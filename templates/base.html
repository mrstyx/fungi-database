<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fungi Database{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f1eb;
      color: #2d2d2d;
      min-height: 100vh;
    }

    header {
      background: #3a5a2b;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1.5rem;
      letter-spacing: 0.05em;
    }

    header a {
      color: #d4e8b8;
      text-decoration: none;
      margin-left: auto;
      font-size: 0.9rem;
      border: 1px solid #d4e8b8;
      padding: 0.35rem 0.8rem;
      border-radius: 4px;
      transition: background 0.2s;
    }

    header a:hover { background: #4a7a38; }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .flash-messages { margin-bottom: 1rem; }

    .flash {
      padding: 0.75rem 1rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <span style="font-size:1.6rem;">🍄</span>
    <h1><a href="{{ url_for('index') }}" style="color:inherit;text-decoration:none;">Fungi Database</a></h1>
    <a href="{{ url_for('add') }}">+ Add Entry</a>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
